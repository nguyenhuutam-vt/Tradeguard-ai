name: AI Code Review

# This workflow is for PR review only. It does not run on pushes to main.
on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: read

jobs:
  codex-review:
    name: Codex PR Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}

    steps:
      - name: Check out pull request
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          persist-credentials: false

      - name: Fetch pull request refs
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin "$PR_BASE_REF" "+refs/pull/$PR_NUMBER/head"

      - name: Run Codex AI review
        id: run_codex
        uses: openai/codex-action@v1
        with:
          # OPENAI_API_KEY must be configured in GitHub Actions secrets.
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          prompt: |
            You are reviewing a pull request for Expense Mail App / Money-Mall, a Next.js App Router TypeScript app for Vietnamese personal expense management.

            Review only the changes introduced by this pull request:
            - Base SHA: ${{ github.event.pull_request.base.sha }}
            - Head SHA: ${{ github.event.pull_request.head.sha }}
            - PR number: #${{ github.event.pull_request.number }}

            Focus only on serious, actionable issues:
            - hardcoded secrets, API keys, tokens, passwords, or committed secret files
            - exposed environment variables or Supabase keys outside environment variables
            - Supabase security mistakes, unsafe database queries, or unsafe RLS changes
            - Next.js App Router mistakes
            - unnecessary client components
            - unused imports or dead code
            - TypeScript errors
            - unnecessary new files or components
            - over-engineering beyond the PR scope
            - mobile UI regressions
            - whether the PR matches its requested scope

            Keep the review concise and actionable. If there are no serious issues, say so clearly.

            Pull request title and body:
            ----
            ${{ github.event.pull_request.title }}
            ${{ github.event.pull_request.body }}

  post-review:
    name: Post Codex Review
    runs-on: ubuntu-latest
    needs: codex-review
    if: needs.codex-review.outputs.final_message != ''
    permissions:
      issues: write
      pull-requests: write

    steps:
      - name: Comment on pull request
        uses: actions/github-script@v7
        env:
          CODEX_REVIEW: ${{ needs.codex-review.outputs.final_message }}
        with:
          github-token: ${{ github.token }}
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: process.env.CODEX_REVIEW,
            });
